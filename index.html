<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Chance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
    <div>SECOND CHANCE</div>
    <div id="ageDisplay">Age: 0</div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen active">
    <div class="card">
        <h1>Second Chance</h1>
        <p>Life Simulator</p>
        <button onclick="showCreator()">New Life</button>
        <button onclick="loadGame()">Continue</button>
    </div>
</div>

<!-- CREATOR -->
<div id="creatorScreen" class="screen">
    <div class="card">
        <h2>Create Life</h2>

        <input id="first" placeholder="First Name">
        <input id="last" placeholder="Last Name">

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <button onclick="startGame()">Start Life</button>
        <button onclick="showMenu()">Back</button>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <button onclick="setTab('life')">Life</button>
        <button onclick="setTab('stats')">Stats</button>
        <button onclick="setTab('relations')">Relations</button>
        <button onclick="setTab('jobs')">Jobs</button>
        <button onclick="setTab('activity')">Activity</button>
    </div>

    <!-- MAIN -->
    <div id="main">

        <!-- LIFE -->
        <div id="lifeTab" class="tab activeTab">
            <h2 id="name"></h2>

            <div class="card">
                <p>Your story begins...</p>
            </div>

            <button id="ageBtn" onclick="ageUp()">AGE UP</button>

            <div id="log"></div>
        </div>

        <!-- STATS -->
        <div id="statsTab" class="tab">
            <div class="card">

                <div class="stat">
                    <div class="label">Health</div>
                    <div class="bar"><div id="healthBar" class="fill"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Happiness</div>
                    <div class="bar"><div id="happinessBar" class="fill"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Smarts</div>
                    <div class="bar"><div id="smartsBar" class="fill"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Looks</div>
                    <div class="bar"><div id="looksBar" class="fill"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Money</div>
                    <div class="bar"><div id="moneyBar" class="fill"></div></div>
                </div>

            </div>
        </div>

        <!-- RELATIONS -->
        <div id="relationsTab" class="tab">
            <div class="card">
                <p>Family system coming soon</p>
            </div>
        </div>

        <!-- JOBS -->
        <div id="jobsTab" class="tab">
            <div class="card">
                <p>No job yet</p>
            </div>
        </div>

        <!-- ACTIVITY -->
        <div id="activityTab" class="tab">
            <div class="card">
                <button onclick="commitCrime()">Commit Crime</button>
                <button onclick="saveGame()">Save Game</button>
                <button onclick="loadGame()">Load Game</button>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
