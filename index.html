<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Chance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <img src="logo.png" id="logo">
  <h1>SECOND CHANCE</h1>
  <p>Life Simulator</p>
  <div class="loader"></div>
</div>

<!-- CHARACTER CREATION -->
<div id="creatorScreen" class="hidden">

  <div class="header">
    <h1>New Life</h1>
    <p>Create your character & start your story</p>
  </div>

  <div class="cardList">

    <div class="card">
      <label>Name</label>
      <input id="name" placeholder="Enter name">
    </div>

    <div class="card">
      <label>Gender</label>
      <select id="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="card">
      <label>Country</label>
      <select id="country">
        <option>United States</option>
        <option>United Kingdom</option>
        <option>Canada</option>
      </select>
    </div>

    <div class="card">
      <label>Place</label>
      <input id="place" placeholder="City">
    </div>

    <div class="card special">
      <label>Special Talent</label>
      <select id="talent">
        <option>None</option>
        <option>Sports</option>
        <option>Music</option>
        <option>Business</option>
      </select>
    </div>

    <button class="startBtn" onclick="startGame()">
      START A NEW LIFE
    </button>

  </div>

</div>

<!-- GAME SCREEN (EMPTY FOR NOW) -->
<div id="gameScreen" class="hidden">
  <h2 style="text-align:center;margin-top:50px;">Game starts here next step ??</h2>
</div>

<script src="script.js"></script>
</body>
</html>
