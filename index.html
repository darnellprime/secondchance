<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance - Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="left">
      <div class="occupation" id="occupation">Infant</div>
      <div class="age" id="ageDisplay">Age: 0</div>
    </div>

    <div class="center">
      <button onclick="ageUp()">? Age Up</button>
    </div>

    <div class="right">
      <div class="name" id="nameDisplay">Unknown</div>
    </div>

  </div>

  <!-- MAIN -->
  <div class="layout">

    <!-- LEFT STATS -->
    <div class="panel">
      <h3>Stats</h3>
      <div id="stats"></div>
    </div>

    <!-- CENTER FEED -->
    <div class="main">
      <div id="lifeFeed">Your life will appear here...</div>
    </div>

    <!-- RIGHT TABS -->
    <div class="panel">

      <div class="tabs">
        <button onclick="setTab('relationships')">Relationships</button>
        <button onclick="setTab('activities')">Activities</button>
        <button onclick="setTab('assets')">Assets</button>
        <button onclick="setTab('school')">School</button>
      </div>

      <div id="tabContent"></div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
