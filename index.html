<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance Life Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="logo">
    <img src="assets/logo.png" width="180">
  </div>

  <div class="loader"></div>
  <p>Loading your second chance...</p>
</div>

<!-- GAME -->
<div id="game" class="hidden">

  <div class="top-bar">
    <h1>Welcome to Second Chance</h1>
    <p>Create your character and begin your story</p>
  </div>

  <div class="creator">

    <!-- CHARACTER PANEL -->
    <div class="panel">
      <h2>Character Creation</h2>

      <label>Name</label>
      <input type="text" id="name" placeholder="Enter name">

      <label>Age</label>
      <input type="number" id="age" value="18">

      <label>Gender</label>
      <select id="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <!-- COUNTRY -->
      <label>Country</label>
      <select id="country" onchange="updateStates()">
        <option value="">Select Country</option>
        <option value="US">???? United States</option>
        <option value="CA">???? Canada</option>
        <option value="MX">???? Mexico</option>
        <option value="UK">???? United Kingdom</option>
        <option value="JP">???? Japan</option>
        <option value="DE">???? Germany</option>
      </select>

      <!-- STATE -->
      <label>State / Province</label>
      <select id="state">
        <option>Select country first</option>
      </select>

      <button onclick="startGame()">Start Life</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview">
      <div class="card">
        <h3>Preview</h3>
        <p id="previewText">Fill out your character details...</p>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
