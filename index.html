<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="brand">
    <img src="assets/logo.png">
    <p>Loading your second chance...</p>
  </div>
  <div class="bar"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- TOP HEADER -->
  <div class="header">
    <div class="title">SECOND CHANCE</div>
    <div class="subtitle">Life Simulator</div>
  </div>

  <div class="layout">

    <!-- LEFT: CHARACTER DEVICE CARD -->
    <div class="phone">

      <div class="phone-header">
        <div class="avatar" id="avatar">??</div>
        <div>
          <div class="name" id="liveName">Unknown</div>
          <div class="meta" id="liveMeta">Create your life</div>
        </div>
      </div>

      <!-- STEP CONTENT -->
      <div class="screen">

        <!-- STEP 1 -->
        <div class="step show" id="step1">
          <input id="name" placeholder="Full Name">
          <select id="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
          <input id="age" type="number" value="18">
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step2">
          <select id="country" onchange="updateStates()">
            <option value="">Country</option>
            <option value="US">???? United States</option>
            <option value="CA">???? Canada</option>
            <option value="MX">???? Mexico</option>
            <option value="UK">???? United Kingdom</option>
          </select>

          <select id="state">
            <option>Select country</option>
          </select>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step3">
          <div class="big-avatar" id="bigAvatar">??</div>
          <div class="hint">Your life is being formed...</div>
        </div>

        <!-- STEP 4 -->
        <div class="step" id="step4">
          <div class="story" id="story"></div>
        </div>

      </div>

      <!-- NAV -->
      <div class="nav">
        <button onclick="prevStep()">Back</button>
        <button onclick="nextStep()">Next</button>
      </div>

      <button class="start" onclick="startGame()">START LIFE</button>

    </div>

    <!-- RIGHT: INFO PANEL -->
    <div class="panel">

      <div class="panel-title">Life Preview</div>

      <div class="card" id="preview">
        Build your character to begin your story...
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
