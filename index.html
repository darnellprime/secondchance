<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">
  <div class="brand">
    <img src="assets/logo.png">
    <p>Preparing your second chance...</p>
  </div>
</div>

<div id="app" class="hidden">

  <div class="header">
    <div class="title">SECOND CHANCE</div>
    <div class="subtitle">Life Simulator</div>
  </div>

  <div class="layout">

    <div class="phone">

      <div class="phone-top">
        <div class="avatar" id="avatar">??</div>
        <div>
          <div class="name" id="liveName">Unknown</div>
          <div class="meta" id="liveMeta">Create your story</div>
        </div>
      </div>

      <div class="screen">

        <div class="step show" id="step1">
          <input id="name" placeholder="Full Name">
          <select id="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
          <input id="age" type="number" value="18">
        </div>

        <div class="step" id="step2">
          <select id="country" onchange="updateStates()">
            <option value="">Country</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="UK">United Kingdom</option>
            <option value="JP">Japan</option>
          </select>

          <select id="state">
            <option>Select country</option>
          </select>
        </div>

        <div class="step" id="step3">
          <div class="big-avatar">??</div>
          <div class="hint">Your identity is forming...</div>
        </div>

        <div class="step" id="step4">
          <div id="story"></div>
        </div>

      </div>

      <div class="nav">
        <button onclick="prevStep()">Back</button>
        <button onclick="nextStep()">Next</button>
      </div>

      <button class="start" onclick="startGame()">Begin Life</button>

    </div>

    <div class="panel">
      <div class="panel-title">Life Preview</div>
      <div class="card" id="preview"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
