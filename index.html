<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Chance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
    <div>SECOND CHANCE</div>
    <div id="ageDisplay">Age: 0</div>
</div>

<!-- MENU SCREEN -->
<div id="menuScreen" class="screen active">
    <div class="card">
        <h1>Second Chance</h1>
        <p>Life Simulator</p>

        <button onclick="showCreator()">New Life</button>
        <button onclick="loadGame()">Continue</button>
    </div>
</div>

<!-- CREATOR SCREEN -->
<div id="creatorScreen" class="screen">
    <div class="card">
        <h2>Create Your Life</h2>

        <input id="first" placeholder="First Name">
        <input id="last" placeholder="Last Name">

        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <button onclick="startGame()">Start Life</button>
        <button onclick="showMenu()">Back</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <button onclick="setTab('life')">Life</button>
        <button onclick="setTab('stats')">Stats</button>
        <button onclick="setTab('relations')">Relations</button>
        <button onclick="setTab('jobs')">Jobs</button>
        <button onclick="setTab('activity')">Activity</button>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main">

        <!-- LIFE TAB -->
        <div id="lifeTab" class="tab activeTab">
            <h2 id="name"></h2>

            <div class="card">
                <p>Your journey begins...</p>
            </div>

            <button onclick="ageUp()">AGE UP ?</button>

            <div id="log"></div>
        </div>

        <!-- STATS -->
        <div id="statsTab" class="tab">
            <div class="card">
                <p>Health: <span id="health"></span></p>
                <p>Happiness: <span id="happiness"></span></p>
                <p>Smarts: <span id="smarts"></span></p>
                <p>Looks: <span id="looks"></span></p>
                <p>Money: $<span id="money"></span></p>
            </div>
        </div>

        <!-- RELATIONS -->
        <div id="relationsTab" class="tab">
            <div class="card">
                <p>Parents: Not added yet</p>
                <p>Friends: Not added yet</p>
            </div>
        </div>

        <!-- JOBS -->
        <div id="jobsTab" class="tab">
            <div class="card">
                <p>No job yet</p>
            </div>
        </div>

        <!-- ACTIVITY -->
        <div id="activityTab" class="tab">
            <div class="card">
                <button onclick="commitCrime()">Commit Crime</button>
                <button onclick="saveGame()">Save Game</button>
                <button onclick="loadGame()">Load Game</button>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
