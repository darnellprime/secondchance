<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="brand">
    <img src="assets/logo.png">
    <p>Generating your life...</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="header">
    <div class="title">SECOND CHANCE</div>
    <div class="subtitle">Life Simulator Engine</div>
  </div>

  <div class="layout">

    <!-- LEFT -->
    <div class="phone">

      <div class="phone-top">
        <div class="avatar">??</div>
        <div>
          <div class="name" id="liveName">Unknown</div>
          <div class="meta" id="liveMeta">Begin your story</div>
        </div>
      </div>

      <div class="screen">

        <!-- STEP 1 -->
        <div class="step show" id="step1">
          <input id="name" placeholder="Full Name">

          <select id="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>

          <input id="age" type="number" value="18" min="1">
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step2">
          <select id="country" onchange="updateStates()">
            <option value="">Country</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="UK">United Kingdom</option>
            <option value="JP">Japan</option>
          </select>

          <select id="state">
            <option>Select country</option>
          </select>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step3">
          <div class="big-avatar">??</div>
          <div class="hint">Generating your life profile...</div>
        </div>

        <!-- STEP 4 -->
        <div class="step" id="step4">
          <div id="story"></div>
        </div>

      </div>

      <div class="nav">
        <button onclick="prevStep()">Back</button>
        <button onclick="nextStep()">Next</button>
      </div>

      <button class="start" onclick="startGame()">START LIFE</button>

    </div>

    <!-- RIGHT -->
    <div class="panel">

      <div class="panel-title">Life Profile</div>

      <div class="card" id="preview">Create your character...</div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
