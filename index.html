<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Second Chance Life Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="logo">
    <img src="assets/logo.png" width="180">
  </div>

  <div class="loader"></div>
  <p>Loading your second chance...</p>
</div>

<!-- GAME -->
<div id="game" class="hidden">

  <div class="top-bar">
    <h1>Second Chance</h1>
    <p>Build your life from scratch</p>
  </div>

  <div class="creator">

    <div class="glass-panel">

      <div class="panel-title">Character Creator</div>

      <input type="text" id="name" placeholder="Full Name">
      <input type="number" id="age" value="18">

      <select id="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <select id="country" onchange="updateStates()">
        <option value="">Select Country</option>
        <option value="US">???? United States</option>
        <option value="CA">???? Canada</option>
        <option value="MX">???? Mexico</option>
        <option value="UK">???? United Kingdom</option>
        <option value="JP">???? Japan</option>
        <option value="DE">???? Germany</option>
      </select>

      <select id="state">
        <option>Select Country First</option>
      </select>

      <button onclick="startGame()">Start Life</button>

    </div>

    <div class="preview-card">

      <div class="preview-title">Life Preview</div>

      <div id="previewText">
        Fill out your character to begin...
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
